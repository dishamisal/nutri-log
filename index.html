<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriLog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      padding: 48px 20px 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .nav {
      width: 100%;
      max-width: 600px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
    }
    .nav-wordmark {
      font-family: var(--font-display);
      font-size: 22px;
      color: var(--text);
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      gap: 4px;
    }
    .nav-link {
      font-size: 13px;
      color: var(--text3);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      transition: all 0.15s;
    }
    .nav-link:hover { color: var(--text); background: var(--surface2); }
    .nav-link.active { color: var(--text); background: var(--surface2); }

    .totals-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .total-tile {
      background: var(--surface);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-md);
      padding: 12px 10px;
      text-align: center;
    }
    .total-tile .val {
      font-size: 20px;
      font-weight: 500;
      line-height: 1;
      margin-bottom: 4px;
    }
    .total-tile .unit {
      font-size: 10px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .input-card { margin-bottom: 16px; }
    .example-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 10px 0 16px;
    }
    .chip {
      font-size: 11px;
      color: var(--text2);
      background: var(--surface2);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .chip:hover { border-color: var(--border2); color: var(--text); }

    .section-label {
      font-size: 11px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 10px;
    }
    .empty-state {
      text-align: center;
      padding: 32px 0;
      color: var(--text3);
      font-size: 13px;
    }
    .meal-card {
      background: var(--surface);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-md);
      margin-bottom: 10px;
      overflow: hidden;
      animation: fadeUp 0.3s ease forwards;
    }
    .meal-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .meal-card-header:hover { background: var(--surface2); }
    .meal-card-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }
    .meal-card-meta {
      font-size: 11px;
      color: var(--text3);
      margin-top: 2px;
    }
    .meal-card-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .meal-card-kcal {
      font-size: 14px;
      font-weight: 500;
      color: var(--green);
    }
    .remove-btn {
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 2px 4px;
      transition: color 0.15s;
    }
    .remove-btn:hover { color: var(--red); }

    .meal-items {
      display: none;
      border-top: 0.5px solid var(--border);
    }
    .meal-items.open { display: block; }
    .items-head, .item-row {
      display: grid;
      grid-template-columns: 1fr 52px 52px 52px 52px;
      gap: 6px;
      padding: 8px 14px;
      font-size: 12px;
    }
    .items-head {
      color: var(--text3);
      border-bottom: 0.5px solid var(--border);
      letter-spacing: 0.04em;
    }
    .items-head span:not(:first-child),
    .item-row .im { text-align: right; }
    .item-row { border-bottom: 0.5px solid var(--border); }
    .item-row:last-child { border-bottom: none; }
    .item-row:hover { background: var(--surface2); }
    .in { color: var(--text); }
    .ip { font-size: 10px; color: var(--text3); margin-top: 1px; }
    .im { color: var(--text2); }

    .summary-card {
      margin-top: 24px;
      display: none;
    }
    .summary-card.visible { display: block; }
    .summary-text {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.7;
      margin-bottom: 14px;
    }
    .highlight-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }
    .highlight {
      font-size: 13px;
      color: var(--text2);
      padding: 8px 12px;
      background: var(--surface2);
      border-radius: var(--radius-sm);
      border-left: 2px solid var(--border2);
    }
    .highlight:first-child { border-left-color: var(--green); }
    .highlight:last-child  { border-left-color: var(--amber); }
    .tip-box {
      font-size: 13px;
      color: var(--text2);
      padding: 10px 12px;
      background: var(--blue-dim);
      border: 0.5px solid var(--blue-border);
      border-radius: var(--radius-sm);
    }
    .tip-label {
      font-size: 10px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 4px;
    }

    .error-box {
      background: var(--red-dim);
      border: 0.5px solid var(--red-border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      color: var(--red);
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav class="nav animate-fadeUp">
    <a class="nav-wordmark" href="index.html">NutriLog</a>
    <div class="nav-links">
      <a class="nav-link active" href="index.html">Today</a>
      <a class="nav-link" href="profile.html">Profile</a>
    </div>
  </nav>

  <div class="container">

    <!-- Totals -->
    <div class="totals-grid animate-fadeUp delay-1">
      <div class="total-tile tile-green">
        <div class="val val-green" id="t-cal">0</div>
        <div class="unit">kcal</div>
        <div class="progress-bar"><div class="progress-fill" id="p-cal" style="width:0%;background:var(--green)"></div></div>
      </div>
      <div class="total-tile tile-blue">
        <div class="val val-blue" id="t-pro">0g</div>
        <div class="unit">protein</div>
        <div class="progress-bar"><div class="progress-fill" id="p-pro" style="width:0%;background:var(--blue)"></div></div>
      </div>
      <div class="total-tile tile-amber">
        <div class="val val-amber" id="t-carb">0g</div>
        <div class="unit">carbs</div>
        <div class="progress-bar"><div class="progress-fill" id="p-carb" style="width:0%;background:var(--amber)"></div></div>
      </div>
      <div class="total-tile tile-red">
        <div class="val val-red" id="t-fat">0g</div>
        <div class="unit">fats</div>
        <div class="progress-bar"><div class="progress-fill" id="p-fat" style="width:0%;background:var(--red)"></div></div>
      </div>
    </div>

    <!-- Input -->
    <div class="card input-card animate-fadeUp delay-2">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <label class="label" for="meal-input" style="margin-bottom:0">What did you eat?</label>
        <button id="mic-btn" onclick="toggleMic()" title="Voice input" style="background:var(--surface2);border:0.5px solid var(--border2);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;flex-shrink:0;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text2)">
            <rect x="9" y="2" width="6" height="12" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="8" y1="22" x2="16" y2="22"/>
          </svg>
        </button>
      </div>
      <textarea id="meal-input" rows="3"
        placeholder="e.g. 2 rotis with dal makhani, a cup of rice, and a glass of lassi"></textarea>
      <div id="mic-status" style="font-size:11px;color:var(--text3);margin-top:6px;min-height:16px;display:none">Listening...</div>

      <div class="example-chips">
        <div class="chip" onclick="fillExample(this)">2 rotis, paneer sabzi, chai</div>
        <div class="chip" onclick="fillExample(this)">bowl of oatmeal, banana, black coffee</div>
        <div class="chip" onclick="fillExample(this)">idli sambar, filter coffee</div>
        <div class="chip" onclick="fillExample(this)">grilled chicken sandwich, coke</div>
        <div class="chip" onclick="fillExample(this)">large pizza slice, diet coke</div>
      </div>

      <button class="btn btn-primary" id="log-btn">
        <span class="spinner" id="spinner" style="display:none"></span>
        <span id="btn-text">Log meal</span>
      </button>
      <div class="error-box" id="error-box"></div>
    </div>

    <!-- Meal log -->
    <div class="section-label">Today's log</div>
    <div id="meal-log">
      <div class="empty-state" id="empty-state">No meals logged yet. Add your first one above.</div>
    </div>

    <!-- Day summary -->
    <div class="card summary-card" id="summary-card">
      <label class="label">Day summary</label>
      <button class="btn btn-ghost" id="summary-btn" style="margin-bottom:16px;width:100%">
        <span class="spinner" id="summary-spinner" style="display:none"></span>
        <span id="summary-btn-text">Get AI summary of my day</span>
      </button>
      <div id="summary-content" style="display:none">
        <div class="summary-text" id="summary-text"></div>
        <div class="highlight-row" id="highlight-row"></div>
        <div class="tip-box">
          <div class="tip-label">Next meal tip</div>
          <div id="tip-text"></div>
        </div>
      </div>
    </div>

  </div>

<script type="module">
  import { addMeal, removeMeal, getTotals, getProgress, getMeals, getSummary } from "./app.js";

  window.fillExample = (el) => {
    document.getElementById("meal-input").value = el.textContent.trim();
  };

  window.handleLog = async () => {
    const input   = document.getElementById("meal-input");
    const btn     = document.getElementById("log-btn");
    const spinner = document.getElementById("spinner");
    const btnText = document.getElementById("btn-text");
    const errBox  = document.getElementById("error-box");
    const text    = input.value.trim();

    if (!text) return;

    btn.disabled          = true;
    spinner.style.display = "block";
    btnText.textContent   = "Analyzing...";
    errBox.style.display  = "none";

    try {
      const meal = await addMeal(text);
      input.value = "";
      renderMeal(meal);
      updateTotals();
      showSummaryButton();
    } catch (e) {
      errBox.textContent   = "Couldn't parse that meal. Try being a bit more specific.";
      errBox.style.display = "block";
    } finally {
      btn.disabled          = false;
      spinner.style.display = "none";
      btnText.textContent   = "Log meal";
    }
  };

  window.handleRemove = (id) => {
    removeMeal(id);
    const el = document.getElementById("meal-" + id);
    if (el) el.remove();
    updateTotals();
    if (getMeals().length === 0) {
      document.getElementById("empty-state").style.display = "block";
      document.getElementById("summary-card").classList.remove("visible");
    }
  };

  window.toggleItems = (id) => {
    const el = document.getElementById("items-" + id);
    if (el) el.classList.toggle("open");
  };

  window.handleSummary = async () => {
    const btn     = document.getElementById("summary-btn");
    const spinner = document.getElementById("summary-spinner");
    const btnText = document.getElementById("summary-btn-text");
    const content = document.getElementById("summary-content");

    btn.disabled          = true;
    spinner.style.display = "block";
    btnText.textContent   = "Thinking...";

    try {
      const data = await getSummary();
      document.getElementById("summary-text").textContent = data.summary;
      document.getElementById("tip-text").textContent     = data.tip;

      const hr = document.getElementById("highlight-row");
      hr.innerHTML = "";
      data.highlights.forEach(h => {
        const div       = document.createElement("div");
        div.className   = "highlight";
        div.textContent = h;
        hr.appendChild(div);
      });

      content.style.display = "block";
      btn.style.display     = "none";
    } catch (e) {
      btnText.textContent   = "Try again";
      btn.disabled          = false;
      spinner.style.display = "none";
    }
  };

  function renderMeal(meal) {
    document.getElementById("empty-state").style.display = "none";
    const time = new Date(meal.logged_at).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

    const itemsHTML = meal.items.map(item => `
      <div class="item-row">
        <div><div class="in">${item.name}</div><div class="ip">${item.portion}</div></div>
        <div class="im">${item.calories}</div>
        <div class="im">${item.protein_g}g</div>
        <div class="im">${item.carbs_g}g</div>
        <div class="im">${item.fat_g}g</div>
      </div>`).join("");

    const card     = document.createElement("div");
    card.className = "meal-card";
    card.id        = "meal-" + meal.id;
    card.innerHTML = `
      <div class="meal-card-header" onclick="toggleItems('${meal.id}')">
        <div>
          <div class="meal-card-title">${meal.meal_title}</div>
          <div class="meal-card-meta">${time} · ${meal.total.protein_g}g protein · ${meal.total.carbs_g}g carbs · ${meal.total.fat_g}g fat</div>
        </div>
        <div class="meal-card-right">
          <div class="meal-card-kcal">${meal.total.calories} kcal</div>
          <button class="remove-btn" onclick="event.stopPropagation(); handleRemove('${meal.id}')" title="Remove">✕</button>
        </div>
      </div>
      <div class="meal-items" id="items-${meal.id}">
        <div class="items-head">
          <span>Item</span><span>kcal</span><span>pro</span><span>carb</span><span>fat</span>
        </div>
        ${itemsHTML}
      </div>`;

    document.getElementById("meal-log").appendChild(card);
  }

  function updateTotals() {
    const t = getTotals();
    const p = getProgress();

    document.getElementById("t-cal").textContent  = t.calories;
    document.getElementById("t-pro").textContent  = t.protein_g + "g";
    document.getElementById("t-carb").textContent = t.carbs_g + "g";
    document.getElementById("t-fat").textContent  = t.fat_g + "g";

    document.getElementById("p-cal").style.width  = p.calories  + "%";
    document.getElementById("p-pro").style.width  = p.protein_g + "%";
    document.getElementById("p-carb").style.width = p.carbs_g   + "%";
    document.getElementById("p-fat").style.width  = p.fat_g     + "%";
  }

  function showSummaryButton() {
    document.getElementById("summary-card").classList.add("visible");
    document.getElementById("summary-content").style.display = "none";
    document.getElementById("summary-btn").style.display     = "block";
    document.getElementById("summary-btn").disabled          = false;
    document.getElementById("summary-btn-text").textContent  = "Get AI summary of my day";
  }

  document.getElementById("meal-input").addEventListener("keydown", e => {
    if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) window.handleLog();
  });
  document.getElementById("log-btn").addEventListener("click", window.handleLog);
  document.getElementById("summary-btn").addEventListener("click", window.handleSummary);

  /* ── Voice input ── */
  let recognition = null;
  let isListening = false;

  window.toggleMic = () => {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      alert("Voice input is only supported in Chrome. Please use Chrome for this feature.");
      return;
    }

    if (isListening) {
      recognition.stop();
      return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition             = new SpeechRecognition();
    recognition.lang           = "en-US";
    recognition.continuous     = false;
    recognition.interimResults = true;

    const micBtn    = document.getElementById("mic-btn");
    const micStatus = document.getElementById("mic-status");
    const input     = document.getElementById("meal-input");

    recognition.onstart = () => {
      isListening              = true;
      micBtn.style.background  = "var(--red-dim)";
      micBtn.style.borderColor = "var(--red-border)";
      micStatus.style.display  = "block";
      micStatus.textContent    = "Listening...";
      micStatus.style.color    = "var(--red)";
    };

    recognition.onresult = (e) => {
      const transcript = Array.from(e.results)
        .map(r => r[0].transcript)
        .join("");
      input.value           = transcript;
      micStatus.textContent = "Got it — hit Log meal or keep speaking";
      micStatus.style.color = "var(--green)";
    };

    recognition.onend = () => {
      isListening              = false;
      micBtn.style.background  = "var(--surface2)";
      micBtn.style.borderColor = "var(--border2)";
      setTimeout(() => { micStatus.style.display = "none"; }, 2000);
    };

    recognition.onerror = () => {
      isListening              = false;
      micBtn.style.background  = "var(--surface2)";
      micBtn.style.borderColor = "var(--border2)";
      micStatus.textContent    = "Microphone error — please try again";
      micStatus.style.color    = "var(--text3)";
    };

    recognition.start();
  };
</script>
</body>
</html>
